server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Gzip Compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # SPA Routing: Wenn die Datei nicht existiert, leite auf index.html um
    location / {
        try_files $uri $uri/ /index.html;
        
        # WICHTIG: Die index.html darf NIEMALS gecached werden.
        # Sonst lädt der Browser nach einem Deployment die alten gehashten JS-Dateien nicht!
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
    }

    # API Requests blockieren (sollten eigentlich vom Reverse Proxy abgefangen werden)
    location /api/ {
        return 404;
    }

    # Browser Caching für statische Assets (CSS/JS/Bilder)
    # Da Vite Hashes in den Dateinamen verwendet, ist "immutable" hier sicher.
    location ~* \.(?:css|js|jpg|svg|webp|png|ico|woff2?|eot|ttf)$ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }
}
